<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Verifique seu e-mail</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #111;
            padding: 40px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            color: #fff;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 10px;
        }

        p {
            font-size: 14px;
            color: #ccc;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            padding: 12px 20px;
            background: #00c6ff;
            color: #000;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #00a2cc;
        }

        .icon {
            font-size: 40px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">📩</div>

        <h1>Verifique seu e-mail</h1>

        <p>
            Enviamos um link para redefinir sua senha.<br>
            Verifique sua caixa de entrada.
        </p>

        <a href="/login/" class="btn">Voltar para login</a>
    </div>

</body>
</html>
