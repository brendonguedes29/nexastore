<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Recuperar acesso | NexaStore</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

.card {
    background: rgba(15, 23, 42, 0.9);
    padding: 30px;
    border-radius: 14px;
    width: 350px;
    box-shadow: 0 0 40px rgba(34,211,238,0.2);
    text-align: center;
}

h2 {
    margin-bottom: 10px;
}

p {
    font-size: 14px;
    color: #cbd5f5;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    margin-bottom: 15px;
    background: #1e293b;
    color: white;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(90deg,#22d3ee,#38bdf8);
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    opacity: 0.8;
}

.voltar {
    margin-top: 15px;
    display: block;
    color: #22d3ee;
    text-decoration: none;
}
</style>

</head>

<body>

<div class="card">
    <h2>Recuperar acesso</h2>

    <p>
        Informe seu e-mail. Vamos enviar seu usuário e um link para redefinir sua senha.
    </p>

    <form method="post">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Digite seu e-mail" required>
        <button type="submit">Enviar recuperação</button>
    </form>

    <a href="{% url 'login_loja' %}" class="voltar">
        Voltar para login
    </a>
</div>

</body>
</html>
