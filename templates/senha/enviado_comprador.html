<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-mail enviado | {{ loja.nome }}</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}

        body{
            font-family:Arial,sans-serif;
            background:
                radial-gradient(circle at top left, rgba(34,211,238,0.16), transparent 30%),
                linear-gradient(135deg, #071126 0%, #0b1730 50%, #0e7490 100%);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:24px;
            color:#e5eefc;
        }

        .card{
            width:100%;
            max-width:520px;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.12);
            backdrop-filter:blur(10px);
            border-radius:28px;
            padding:32px;
            box-shadow:0 18px 45px rgba(2,6,23,0.35);
            text-align:center;
        }

        .icon{
            width:82px;
            height:82px;
            border-radius:50%;
            margin:0 auto 20px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:36px;
            font-weight:bold;
            color:#fff;
            background:linear-gradient(135deg,#22c55e,#16a34a);
        }

        h1{
            font-size:30px;
            color:#fff;
            margin-bottom:12px;
        }

        p{
            color:#dbe7f5;
            line-height:1.7;
            margin-bottom:22px;
        }

        .btn{
            display:block;
            width:100%;
            padding:14px 18px;
            border-radius:16px;
            text-decoration:none;
            font-weight:800;
            margin-top:12px;
            text-align:center;
        }

        .btn-primary{
            background:linear-gradient(135deg,#22d3ee,#38bdf8);
            color:#082f49;
        }

        .btn-secondary{
            background:rgba(255,255,255,0.08);
            color:#fff;
            border:1px solid rgba(255,255,255,0.14);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✓</div>
        <h1>E-mail enviado</h1>
        <p>
            Se o e-mail informado estiver cadastrado na loja <strong>{{ loja.nome }}</strong>,
            você receberá um link para redefinir sua senha.
        </p>

        <a href="{% url 'login_comprador' loja.slug %}" class="btn btn-primary">
            Voltar para o login da loja
        </a>

        <a href="{% url 'loja' loja.slug %}" class="btn btn-secondary">
            Voltar para a loja
        </a>
    </div>
</body>
</html>
