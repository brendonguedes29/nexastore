<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titulo }}</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{
            font-family:Arial,sans-serif;
            background:linear-gradient(135deg,#111827,#0f172a,#06b6d4);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }
        .card{
            width:100%;
            max-width:520px;
            background:#fff;
            border-radius:22px;
            padding:34px 28px;
            box-shadow:0 20px 50px rgba(0,0,0,.20);
            text-align:center;
        }
        .icone{
            width:72px;
            height:72px;
            border-radius:50%;
            margin:0 auto 18px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:34px;
            font-weight:bold;
            color:#fff;
            background:{% if sucesso %}#10b981{% else %}#ef4444{% endif %};
        }
        h1{
            font-size:30px;
            color:#111827;
            margin-bottom:12px;
        }
        p{
            font-size:16px;
            color:#4b5563;
            line-height:1.7;
            margin-bottom:24px;
        }
        .botao{
            display:inline-block;
            padding:14px 22px;
            border-radius:12px;
            text-decoration:none;
            font-weight:700;
            background:#06b6d4;
            color:#fff;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icone">
            {% if sucesso %}✓{% else %}!{% endif %}
        </div>

        <h1>{{ titulo }}</h1>
        <p>{{ mensagem }}</p>

        <a href="/login/" class="botao">Ir para o login</a>
    </div>
</body>
</html>
