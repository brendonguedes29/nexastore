<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessão expirada</title>
    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#f4f6fb;
            color:#1f2937;
            display:flex;
            align-items:center;
            justify-content:center;
            min-height:100vh;
            padding:24px;
        }
        .box{
            background:white;
            max-width:520px;
            width:100%;
            border-radius:22px;
            padding:32px;
            box-shadow:0 12px 30px rgba(15,23,42,0.08);
            text-align:center;
        }
        .icone{
            width:72px;
            height:72px;
            border-radius:18px;
            margin:0 auto 18px;
            background:linear-gradient(135deg,#f59e0b,#ef4444);
            color:white;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:34px;
            font-weight:bold;
        }
        h1{
            margin:0 0 12px;
            font-size:32px;
        }
        p{
            color:#64748b;
            line-height:1.6;
            margin-bottom:24px;
        }
        .acoes{
            display:flex;
            gap:12px;
            justify-content:center;
            flex-wrap:wrap;
        }
        .botao{
            text-decoration:none;
            border:none;
            cursor:pointer;
            padding:14px 18px;
            border-radius:12px;
            font-weight:700;
            font-size:14px;
            display:inline-block;
        }
        .botao-escuro{
            background:#0b1220;
            color:white;
        }
        .botao-claro{
            background:#e2e8f0;
            color:#0f172a;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="icone">!</div>
        <h1>Sessão expirada</h1>
        <p>
            Sua solicitação não pôde ser concluída porque a página ficou desatualizada ou a sessão expirou.
            Atualize a página e tente novamente. Se necessário, volte ao carrinho e refaça a confirmação.
        </p>

        <div class="acoes">
            <a href="/carrinho/" class="botao botao-escuro">Voltar ao carrinho</a>
            <a href="javascript:location.reload();" class="botao botao-claro">Atualizar página</a>
        </div>
    </div>
</body>
</html>
