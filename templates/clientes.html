<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes</title>
    <style>
        body{font-family:Arial,sans-serif;background:#f4f6fb;margin:0;color:#1f2937;}
        .topo{background:#0f172a;color:white;padding:20px 0;}
        .wrap{width:92%;max-width:1000px;margin:0 auto;}
        .box{background:white;margin-top:30px;padding:24px;border-radius:18px;box-shadow:0 8px 24px rgba(15,23,42,0.06);}
        .botao{background:#0f172a;color:white;text-decoration:none;padding:12px 16px;border-radius:10px;display:inline-block;margin-bottom:20px;}
        ul{padding-left:20px;}
        li{margin-bottom:10px;}
    </style>
</head>
<body>
    <div class="topo">
        <div class="wrap">
            <h1>{{ loja.nome }}</h1>
            <p>Clientes da loja</p>
        </div>
    </div>

    <div class="wrap">
        <div class="box">
            <a class="botao" href="/painel/">Voltar ao painel</a>

            <ul>
                {% for cliente in clientes %}
                    <li>{{ cliente }}</li>
                {% empty %}
                    <li>Nenhum cliente ainda.</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
